services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: intel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./app/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./app/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d intel"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/intel
    ports:
      - "8000:8000"
      - "9100:9100"
    volumes:
      - ./export:/app/export
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  pg_data:
